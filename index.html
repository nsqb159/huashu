<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" type="image/png" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>稽查工单话术生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 1400px; margin: 0 auto; background: white;
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; padding: 20px 28px;
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-text h1 { font-size: 26px; margin-bottom: 4px; }
        .header-text p { opacity: 0.9; font-size: 13px; }
        .search-box { position: relative; width: 280px; }
        .search-box input {
            width: 100%; padding: 12px 18px 12px 45px; border: none; border-radius: 40px;
            font-size: 14px; background: rgba(255,255,255,0.2); color: white;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3);
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.9); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 16px; }
        .main-content { display: grid; grid-template-columns: 320px 1fr; min-height: 650px; background: #fff; }
        .sidebar {
            background: #f8fafc; border-right: 1px solid #e2e8f0;
            overflow-y: auto; max-height: calc(100vh - 160px);
        }
        .category.hidden { display: none; }
        .category-header {
            padding: 16px 20px; background: #fff; cursor: pointer; font-weight: 600;
            display: flex; justify-content: space-between; border-bottom: 1px solid #e2e8f0;
        }
        .category-header.active { background: #2a5298; color: white; }
        .category-count { background: #e2e8f0; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        .category-header.active .category-count { background: white; color: #2a5298; }
        .subcategories { display: none; background: white; }
        .subcategories.show { display: block; }
        .subcategory-item {
            padding: 13px 20px 13px 45px; cursor: pointer; font-size: 14px;
            border-left: 3px solid transparent; border-bottom: 1px solid #f1f5f9;
        }
        .subcategory-item:hover { background: #f1f5f9; border-left-color: #2a5298; }
        .subcategory-item.active { background: #e6f0ff; border-left-color: #2a5298; font-weight: 500; color: #1e3c72; }
        .content-area { padding: 28px; overflow-y: auto; max-height: calc(100vh - 160px); }
        .form-section {
            background: #f9fafb; padding: 24px; border-radius: 20px;
            margin-bottom: 25px; border: 1px solid #eef2f6;
        }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .form-group label { font-weight: 500; color: #1e293b; margin-bottom: 6px; display: block; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 14px; border: 1.5px solid #d1d5db;
            border-radius: 14px; font-size: 14px; background: white;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .template-preview {
            background: white; padding: 22px; border-radius: 20px;
            border: 1px solid #d1d5db; margin-bottom: 20px;
        }
        .template-text {
            background: #f0f9ff; padding: 20px; border-radius: 16px;
            line-height: 1.8; white-space: pre-wrap; font-size: 14.5px;
            border-left: 6px solid #3b82f6; color: #1e293b;
        }
        .highlight { background: #fef3c7; padding: 2px 6px; border-radius: 16px; font-weight: 500; }
        .actions { display: flex; gap: 15px; }
        .btn {
            padding: 14px 20px; border: none; border-radius: 40px; font-size: 15px;
            font-weight: 500; cursor: pointer; transition: all 0.2s; flex: 1; text-align: center;
        }
        .btn-primary { background: #2a5298; color: white; box-shadow: 0 8px 14px rgba(42,82,152,0.3); }
        .btn-primary:hover { background: #1e3c72; transform: translateY(-2px); }
        .btn-secondary { background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; }
        .toast {
            position: fixed; top: 24px; right: 24px; background: #1e293b; color: white;
            padding: 14px 28px; border-radius: 60px; display: none; z-index: 1000;
            animation: slideIn 0.25s; font-weight: 500;
        }
        .toast.show { display: block; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .empty-state { text-align: center; padding: 80px 20px; color: #94a3b8; }
        .shortcut-hint { margin-top: 16px; color: #64748b; text-align: center; font-size: 13px; }
        .required-dot::after { content: " *"; color: #dc2626; }
        .warning-note { background: #fffbeb; border-radius: 14px; padding: 12px 16px; color: #b45309; margin-top: 16px; }
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="header-text">
                <h1>稽查 工单 全量话术</h1>
                <p>稽查话术 / 工单话术 / 全量话术 · 一键生成标准回复</p>
            </div>
        </div>
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索话术… (Ctrl+F)" onkeyup="handleSearch()">
        </div>
    </div>

    <div class="main-content">
        <div class="sidebar" id="sidebar"></div>
        <div class="content-area" id="contentArea">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" width="80" height="80" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                <h3>从左侧选择话术类型</h3>
                <p>稽查话术 / 工单话术 / 全量话术</p>
            </div>
        </div>
    </div>
</div>
<div class="toast" id="toast">✅ 话术已复制到剪贴板</div>

<script>

因偷盗存在较大风险，建议您报警处理，如需帮助可随时联系微店客服，感谢您的配合～`

                },
                '设备离线 (>20分钟)': {

                '设备离线 (<20分钟)': {

                    template: (data) => `老板您好，关于您反馈的设备离线的问题，已核实，店铺于${data.start || 'xxx'}网络出现异常于${data.end || 'xxx'}进行恢复，持续时间为${data.duration || 'xx'}分钟，短时间离线可能是网络存在波动，为避免打扰到您客服会进行实时观察和刷新，设备出现离线情况时，APP会第一时间推送消息提醒。您也可在 APP 内进行实时查看。`
                },
                '门未关 (已开启人形)': {
                    template: () => `老板您好，现店铺均已开启人形检测，若门未关有顾客进店的话是会通过人形检测分配客服的，请您知晓哈。`
                },
                '门未关 (未开启人形)': {
                    template: () => `老板您好，门未关期间会有异常专员在进行实时看管的，后期会为店铺开启人形检测，若门未关有顾客进店的话是会通过人形检测分配客服的，请您知晓哈。`
                },
                'POS离线未告知': {
                    template: () => `老板您好，微店的付款方式有两种：第一种是用pos机支付，第二种也可以用小程序进行支付的，pos无法使用时客服有及时引导顾客用小程序支付，如需要pos离线通知，您可在重点关注内进行备注/可查看app,app是有消息推送的，辛苦您知晓。`
                }
            },
            '三、无异常核实': {
                '全量核实 (30条以内)': {
                    fields: [
                        {name: 'productName', label: '商品名称', type: 'text', placeholder: '如：农夫山泉'},
                        {name: 'date', label: '核实日期段', type: 'text', placeholder: '如：3月1日0:00至3月2日0:00'}
                    ],
                    template: (data) => `老板您好，关于您反馈的${data.productName || 'xx商品'}丢失问题已核实，${data.date || 'x月x日0:00至x月x日0:00'}期间，客服已全量核实所有出入记录，未发现异常，辛苦知晓～`
                },
                '抽查核实 (30条以上)': {
                    fields: [
                        {name: 'productName', label: '商品名称', type: 'text', placeholder: '如：农夫山泉'},
                        {name: 'date', label: '核实日期段', type: 'text', placeholder: '如：3月1日0:00至3月2日23:59'}
                    ],
                    template: (data) => `老板您好，关于您反馈的${data.productName || 'xx商品'}丢失问题，已核实${data.date || 'x月x日0:00至x月x日23:59'}期间，暂未发现异常。因时间段较长核查难度较大，如您有具体时间节点/订单等信息可补充说明，客服会尽快为您处理。如有任何问题可以随时联系服务管家，竭诚为您服务。`
                },
                '非值守期间消失': {
                    fields: [
                        {name: 'productName', label: '商品名称', type: 'text', placeholder: '如：农夫山泉'},
                        {name: 'closeTime', label: '关闭值守时间', type: 'text', placeholder: '如：3月1日22:00'},
                        {name: 'openTime', label: '开启值守时间', type: 'text', placeholder: '如：3月2日8:00'}
                    ],
                    template: (data) => `老板您好，关于您反馈的${data.productName || 'xx商品'}丢失问题已核实，${data.closeTime || 'x月x日0:00'}您关闭值守，${data.openTime || 'x月x日0:00'}再次开启值守时商品已不在，辛苦老板核实是否为非值守期间售出。如有任何问题可以随时联系服务管家，竭诚为您服务。`
                },
                '值守期间无变化': {
                    fields: [
                        {name: 'productName', label: '商品名称', type: 'text', placeholder: '如：农夫山泉'},
                        {name: 'openTime', label: '开启值守时间', type: 'text', placeholder: '如：3月1日8:00'},
                        {name: 'count', label: '商品数量', type: 'text', placeholder: '如：5'}
                    ],
                    template: (data) => `老板您好，关于您反馈的${data.productName || 'xx商品'}丢失问题已核实，${data.openTime || 'x月x日0:00'}开启值守时商品为${data.count || 'x'}个，再次开启值守时商品为${data.count || 'x'}个，无明显变化，辛苦老板核实是否为非值守期间售出。如有任何问题可以随时联系服务管家，竭诚为您服务。`
                }
            }
        };

        let currentCategory = '';
        let currentSubcategory = '';

        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            let html = '';
            Object.keys(templates).forEach(cat => {
                const subs = Object.keys(templates[cat]);
                html += `<div class="category"><div class="category-header" onclick="toggleCategory(this)"><span>${cat}</span><span class="category-count">${subs.length}</span></div><div class="subcategories">`;
                subs.forEach(sub => { html += `<div class="subcategory-item" onclick="selectSubcategory('${cat}', '${sub}')">${sub}</div>`; });
                html += `</div></div>`;
            });
            sidebar.innerHTML = html;
        }

        window.toggleCategory = function(el) {
            const sub = el.nextElementSibling;
            const isActive = el.classList.contains('active');
            document.querySelectorAll('.category-header').forEach(h => { h.classList.remove('active'); h.nextElementSibling.classList.remove('show'); });
            if (!isActive) { el.classList.add('active'); sub.classList.add('show'); }
        };

        window.selectSubcategory = function(cat, sub) {
            currentCategory = cat; currentSubcategory = sub;
            document.querySelectorAll('.subcategory-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            showForm(cat, sub);
        };

        function showForm(cat, sub) {
            const area = document.getElementById('contentArea');
            const tpl = templates[cat][sub];
            
            let extraFields = '';
            if (tpl.fields) {
                tpl.fields.forEach(f => {
                    if (f.options) {
                        extraFields += `<div class="form-group"><label>${f.label}</label><select id="${f.name}">${f.options.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
                    } else {
                        extraFields += `<div class="form-group"><label>${f.label}</label><input type="text" id="${f.name}" placeholder="${f.placeholder || '请输入'}"></div>`;
                    }
                });
            }

            let descField = '';
            if (tpl.needsDesc) {
                descField = `<div class="form-group full-width"><label class="required-dot">异常问题描述</label><textarea id="descInput" placeholder="例如：顾客多付一瓶农夫山泉，少付一盒香烟"></textarea></div>`;
            }

            area.innerHTML = `
                <div class="form-section">
                    <h3>📝 ${sub}</h3>
                    <div class="form-grid">
                        ${extraFields}
                        ${descField}
                    </div>
                    ${tpl.needsDesc ? '<div class="warning-note">💡 提示：请填写具体的异常问题描述，将替换话术中的【异常问题描述】</div>' : ''}
                </div>
                <div class="template-preview">
                    <h3>📄 话术预览</h3>
                    <div class="template-text" id="previewText">${generatePreviewText()}</div>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="copyMessage()">📋 复制话术</button>
                    <button class="btn btn-secondary" onclick="resetForm()">🔄 重置</button>
                </div>
                <div class="shortcut-hint">Ctrl+Enter 复制 · Esc 重置 · Ctrl+F 搜索</div>
            `;

            setTimeout(() => {
                bindInputs();
                updatePreview();
            }, 10);
        }

        function bindInputs() {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                el.addEventListener('input', updatePreview);
                el.addEventListener('change', updatePreview);
            });
        }

        function getFormData() {
            const data = { desc: document.getElementById('descInput')?.value || '【待补充异常描述】' };
            document.querySelectorAll('.form-section input, .form-section select').forEach(el => { 
                if(el.id && el.id !== 'descInput') data[el.id] = el.value; 
            });
            return data;
        }

        function generatePreviewText() {
            if (!currentSubcategory) return '请从左侧选择话术类型';
            const tpl = templates[currentCategory][currentSubcategory];
            const data = getFormData();
            let msg = tpl.template(data);
            return msg.replace(/【.*?】/g, m => `<span class="highlight">${m}</span>`);
        }

        function updatePreview() { 
            const p = document.getElementById('previewText'); 
            if(p) p.innerHTML = generatePreviewText(); 
        }

        window.copyMessage = function() {
            const text = document.getElementById('previewText')?.innerText || '';
            navigator.clipboard?.writeText(text).then(() => {
                const t = document.getElementById('toast'); 
                t.classList.add('show'); 
                setTimeout(() => t.classList.remove('show'), 2000);
            }).catch(() => { 
                const ta = document.createElement('textarea'); 
                ta.value = text; 
                document.body.appendChild(ta); 
                ta.select(); 
                document.execCommand('copy'); 
                document.body.removeChild(ta); 
                const t = document.getElementById('toast'); 
                t.classList.add('show'); 
                setTimeout(() => t.classList.remove('show'), 2000);
            });
        };

        window.resetForm = function() { 
            document.querySelectorAll('.form-section input, .form-section select, .form-section textarea').forEach(el => el.value = ''); 
            updatePreview(); 
        };

        window.handleSearch = function() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.category').forEach(cat => {
                let has = false;
                cat.querySelectorAll('.subcategory-item').forEach(sub => { 
                    if(sub.textContent.toLowerCase().includes(kw)) { 
                        sub.classList.remove('hidden'); 
                        has = true; 
                    } else { 
                        sub.classList.add('hidden'); 
                    } 
                });
                if(kw && has) { 
                    cat.classList.remove('hidden'); 
                    cat.querySelector('.subcategories').classList.add('show'); 
                    cat.querySelector('.category-header').classList.add('active'); 
                } else if(kw) { 
                    cat.classList.add('hidden'); 
                } else { 
                    cat.classList.remove('hidden'); 
                    cat.querySelector('.subcategories').classList.remove('show'); 
                    cat.querySelector('.category-header').classList.remove('active'); 
                    cat.querySelectorAll('.subcategory-item').forEach(s => s.classList.remove('hidden')); 
                }
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            initSidebar();
            document.addEventListener('keydown', e => {
                if(e.ctrlKey && e.key === 'Enter') { 
                    e.preventDefault(); 
                    if(currentSubcategory) copyMessage(); 
                } else if(e.key === 'Escape') { 
                    if(document.querySelector('.form-section')) resetForm(); 
                } else if(e.ctrlKey && e.key === 'f') { 
                    e.preventDefault(); 
                    document.getElementById('searchInput')?.focus(); 
                }
            });
        });
    })();
</script>
</body>
</html>
